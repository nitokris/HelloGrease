services:
  postgres:
    image: postgres:16-alpine
    container_name: javdb-postgres
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    image: 192.168.1.236/javdb/javdb:latest
    build: .
    container_name: javdb-app
    ports:
      - "8095:8095"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/mydb
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      SERVER_PORT: "8095"
      QB_BASE_URL: ${QB_BASE_URL}
      QB_USERNAME: ${QB_USERNAME}
      QB_PASSWORD: ${QB_PASSWORD}
      JAV_FROM: ${JAV_FROM:-/tmp}
      JAV_TARGET: ${JAV_TARGET:-/tmp}
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
